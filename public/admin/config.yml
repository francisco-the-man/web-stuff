# Decap CMS configuration.
# Log in at /admin with GitHub — requires the GitHub OAuth provider to be
# installed on the Netlify site (Site configuration > Access & security > OAuth).
backend:
  name: github
  repo: francisco-the-man/web-stuff
  branch: main
  commit_messages:
    create: 'content: create "{{slug}}"'
    update: 'content: update "{{slug}}"'
    delete: 'content: delete "{{slug}}"'
    uploadMedia: 'content: upload "{{path}}"'
    deleteMedia: 'content: delete "{{path}}"'

site_url: https://www.francisco-the-man.com
display_url: https://www.francisco-the-man.com
logo_url: https://www.francisco-the-man.com/PIRATE-LOGO.png

# Media uploads are committed to the repo
media_folder: "public/projects/images"
public_folder: "/projects/images"

# Allows local editing with `npm run cms-proxy` + `npm run dev`
local_backend: true

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/_projects"
    create: true
    format: "json"
    extension: "json"
    delete: true
    slug: "{{fields.fileName}}"
    identifier_field: "fileName"
    summary: "{{fileName}} - {{projectTitle}} ({{category}})"
    sortable_fields: ['id', 'fileName', 'projectTitle', 'type', 'category']
    view_filters:
      - label: "Computer Projects"
        field: category
        pattern: "computer"
      - label: "Research Projects"
        field: category
        pattern: "research"
      - label: "Both Categories"
        field: category
        pattern: "both"
    editor:
      preview: false
    fields:
      - {label: "Order", name: "id", widget: "number", value_type: "int", required: true, hint: "Display order — lower numbers show first"}
      - {label: "File Name", name: "fileName", widget: "string", required: true, hint: "This is the label shown on the folder tab"}
      - {label: "Project Title", name: "projectTitle", widget: "string", required: true, hint: "The main title of your project"}
      - {label: "Description", name: "description", widget: "markdown", required: true, minimal: true, buttons: [bold, italic, link], editor_components: [], modes: [rich_text, raw], hint: "Short description shown on the folder. Markdown works — select text and use the link button (or [text](url)) for inline links."}
      - {label: "Project Image", name: "projectImg", widget: "image", required: true, hint: "This image will be displayed in the project folder"}
      - {label: "Type", name: "type", widget: "select", options: [
          {label: "Computational", value: "computational"},
          {label: "Written", value: "written"}
        ], required: true}
      - {label: "Category", name: "category", widget: "select", options: [
          {label: "Computer", value: "computer"},
          {label: "Research", value: "research"},
          {label: "Both", value: "both"}
        ], required: true, hint: "Determines which page(s) this project appears on"}
      - {label: "Position", name: "position", widget: "select", options: [
          {label: "Left", value: "left"},
          {label: "Middle", value: "middle"},
          {label: "Right", value: "right"}
        ], required: true, hint: "Determines the folder-tab position"}
      - {label: "Author Names", name: "authorNames", widget: "string", required: false, hint: "Shown for 'written' projects (e.g. Avery Louis (me) & ...)"}
      - {label: "Repository Link", name: "repoLink", widget: "string", required: false, hint: "Shown as the 'code' link for 'computational' projects", pattern: ['^(https?://.*|)$', "Must be a valid URL or empty"]}
      - {label: "Dedicated Page Route", name: "projectSlug", widget: "string", required: false, hint: "Optional site route opened when the folder is clicked, e.g. /research/ddpms"}

  - name: "pages"
    label: "Site Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "src/_content/home.json"
        fields:
          - {label: "Heading", name: "heading", widget: "string", required: true}
          - {label: "Profile Image", name: "profileImage", widget: "image", required: true}
          - {label: "Bio", name: "bio", widget: "markdown", required: true, minimal: true, buttons: [bold, italic, link], editor_components: [], modes: [rich_text, raw], hint: "The bio paragraphs. Markdown works — *italics*, **bold**, and [inline links](https://example.com)."}
